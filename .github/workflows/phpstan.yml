name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:fa88b0c602d16a84b6b8394e989da80474365689c57eee4e64ec57a61eb30355
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:fa88b0c602d16a84b6b8394e989da80474365689c57eee4e64ec57a61eb30355
        with:
          args: analyze --error-format=table /github/workspace
