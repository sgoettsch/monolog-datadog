name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:96d795c105bea41e7b23c26777f7e3e5842e368ca85c5188da2654b145a1aa89
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:96d795c105bea41e7b23c26777f7e3e5842e368ca85c5188da2654b145a1aa89
        with:
          args: analyze --error-format=table /github/workspace
