name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:788d51e61cf5bf63ab1dfca3ed5b8786fcd4df41d608922d6c7f3edc96606d79
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:788d51e61cf5bf63ab1dfca3ed5b8786fcd4df41d608922d6c7f3edc96606d79
        with:
          args: analyze --error-format=table /github/workspace
