name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:2502e9338a04f1e0750f740f0aea2841f46f2dd05f30a1f8ce886cc295e5cee7
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:2502e9338a04f1e0750f740f0aea2841f46f2dd05f30a1f8ce886cc295e5cee7
        with:
          args: analyze --error-format=table /github/workspace
