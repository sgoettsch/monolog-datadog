name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:b74cc846ec8745ff0f0650f6fbb5162a5fa22b5f9f0102cb9ef1aa9bbd36453f
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:b74cc846ec8745ff0f0650f6fbb5162a5fa22b5f9f0102cb9ef1aa9bbd36453f
        with:
          args: analyze --error-format=table /github/workspace
