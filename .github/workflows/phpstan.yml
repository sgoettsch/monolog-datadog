name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:bcf7d963f5c923deb35d458d95907c167adc3eb20efd52a6fdb1e65f4775e4d4
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:bcf7d963f5c923deb35d458d95907c167adc3eb20efd52a6fdb1e65f4775e4d4
        with:
          args: analyze --error-format=table /github/workspace
